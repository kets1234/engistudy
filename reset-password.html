<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - EngiStudy</title>
    <link rel="stylesheet" href="reset-password.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="reset-page">
      <div class="reset-card">
        <div class="reset-header">
          <div class="reset-logo">
            <i class="fa-solid fa-gear"></i>
          </div>
          <h1>Reset Password</h1>
          <p>Create a new password for your EngiStudy account.</p>
        </div>

        <div class="message" id="resetMessage"></div>

        <div class="input-box">
          <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
          <input type="password" id="newPassword" placeholder="New Password" />
          <button
            type="button"
            class="eye-btn"
            onclick="togglePassword('newPassword', this)"
          >
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>

        <div class="input-box">
          <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
          <input
            type="password"
            id="confirmNewPassword"
            placeholder="Confirm New Password"
          />
          <button
            type="button"
            class="eye-btn"
            onclick="togglePassword('confirmNewPassword', this)"
          >
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>

        <button class="reset-btn" onclick="resetPassword()">
          Update Password
        </button>

        <a class="back-link" href="index.html">Back to Sign In</a>
      </div>
    </div>

    <script src="reset-password.js"></script>
  </body>
</html>
